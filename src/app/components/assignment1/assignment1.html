<!-- 1. Have a paragraph and a toggle button; on clicking the button, control the visibility (Show / Hide) of the paragraph.
2. Create a dropdown with state names; when the user changes the dropdown value, print the selected value in a div.
3. create a input box, toggle the type of that input box to (text/password)
4. Create a counter example with three controls: Increment, Decrement, and Reset.
5. Create an inputBox to enter temperature in celcius, convert temperature from Celsius to Fahrenheit. 
	formula:  f = (C × (9/5)) + 32 -->

<!-- 1. Have a paragraph and a toggle button; on clicking the button, control the visibility (Show / Hide) of the paragraph. -->

<div class="border border-3 p-3 m-3">
    <p [hidden] = "flag">This is the paragraph for the assignment</p>
    <div>Flag::{{flag}}</div>
   <button class="btn btn-primary" (click) = "toggleFlag()">CLICK ME</button>
</div>

<!-- 2. Create a dropdown with state names; when the user changes the dropdown value, print the selected value in a div. -->

<div class="border border-3 p-3 m-3">
    <label for="state">Choose a state:</label>
    <select id="state" [(ngModel)] = "state">
    <option value="larnataka">Karnataka</option>
    <option value="Tamilnadu">Tamil Nadu</option>
    <option value="Gujrat">Gujrat</option>
    <option value="Connecticut">Connecticut</option>
    </select>
    <div class="mt-3">{{state}}</div>  
</div>

<!-- 3. create a input box, toggle the type of that input box to (text/password) -->
<div class="border border m-3 p-3">
    <label for="Text" mx-2>Text:</label>
    <input type="text">
<br>
    <label for="Password" mx-2>Password:</label>
    <input type="password">
<br>
<button class="btn btn-primary">Submit</button>
</div>

<!-- 4. Create a counter example with three controls: Increment, Decrement, and Reset. -->

<div class="border border-3 m-3 p-3">
    <div>Counter:: {{counter}}</div>
    <button class="btn btn-primary mx-2" (click) = "increment()">Increment</button>
    <button class="btn btn-secondary mx-2" (click) = "decrement()">Decrement</button>
    <button class="btn btn-success " (click) = "reset()">Reset</button>
</div>

<!-- 5. Create an inputBox to enter temperature in celcius, convert temperature from Celsius to Fahrenheit. 
	formula:  f = (C × (9/5)) + 32  -->

<div class="border border-3 p-3 m-3">

    <label>Enter Celsius:</label>
    <input type="number" [(ngModel)]="celsius">

    <button class="btn btn-primary mx-2" (click)="convert()"> Convert </button>
    <div class="mt-3"> Fahrenheit: {{fahrenheit}} </div>
</div>
