<div class="border border-3 rounded-3 p-3">
    <form #myForm="ngForm" (submit)="submitMyForm(myForm.value)" >
        <p>
            FirstName:<input name="firstName" [(ngModel)]="user.firstName" #firstName="ngModel" required minlength="6" />
            @if(firstName.hasError('required')){
            <span class="text-danger">FirstName is a required field</span>
            }
      @if(firstName.hasError('minlength')){
        <span class="text-danger">FirstName should have minimum 6 chars</span>
      }
        </p>
        <p>SecondName:<input name="lastName" [(ngModel)]="user.lastName" #lastName="ngModel" required minlength="5"/></p>
        <p>Email:<input name="email" ngModel /></p>

        <div ngModelGroup="address">
        <p>City:<input name="city" ngModel /></p>
        <p>State:<input name="state" ngModel /></p>
        <p>Pincode:<input name="pincode" ngModel /></p>
        </div>
        <input type="reset" value="Reset" />
        <input type="submit" value="Submit" class="mx-2" />
    </form>
    <pre>{{myForm.value | json}}</pre>
</div>
